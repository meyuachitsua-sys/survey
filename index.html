<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>大学満足度アンケート</title>

<style>
body{
    font-family: sans-serif;
    margin: 30px;
}

.container{
    width: 500px;
    margin: auto;
}

.question{
    margin-bottom: 20px;
}

textarea{
    width: 100%;
    height: 80px;
}

button{
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}

#complete{
    display: none;
    text-align: center;
    font-size: 24px;
    margin-top: 100px;
}

.error-msg {
    color: red;
    font-size: 13px;
    margin-top: 4px;
    display: none;
}
</style>
</head

<body>

<div class="container" id="survey">

    <h2>大学満足度アンケート</h2>

    <!-- 学年 -->
    <div class="question">
        <p>1. 学年を選んでください <span style="color:red;">*</span></p>

        <label><input type="radio" name="grade" value="1年">1年</label>
        <label><input type="radio" name="grade" value="2年">2年</label>
        <label><input type="radio" name="grade" value="3年">3年</label>
        <label><input type="radio" name="grade" value="4年">4年</label>
        <label><input type="radio" name="grade" value="修士">修士</label>
        <div class="error-msg" id="error-grade">学年を選択してください</div>
    </div>

    <!-- 満足度 -->
    <div class="question">
        <p>2. 満足度を選んでください（5が最高）<span style="color:red;">*</span></p>

        <label><input type="radio" name="satisfaction" value="1">1</label>
        <label><input type="radio" name="satisfaction" value="2">2</label>
        <label><input type="radio" name="satisfaction" value="3">3</label>
        <label><input type="radio" name="satisfaction" value="4">4</label>
        <label><input type="radio" name="satisfaction" value="5">5</label>
        <div class="error-msg" id="error-satisfaction">満足度を選択してください</div>
    </div>

    <!-- 好きな授業 -->
    <div class="question">
        <p>3. 好きな授業を書いてください <span style="color:red;">*</span></p>
        <textarea id="favoriteClass"></textarea>
        <div class="error-msg" id="error-favorite">好きな授業を入力してください</div>
    </div>

    <!-- コメント -->
    <div class="question">
        <p>4. コメントを書いてください <span style="color:red;">*</span></p>
        <textarea id="comment"></textarea>
        <div class="error-msg" id="error-comment">コメントを入力してください</div>
    </div>

    <button onclick="submitSurvey()">送信</button>

</div>

<!-- 送信後画面 -->
<div id="complete" style="display:none;">
    <h2>送信できました。</h2>

    <p id="resultGrade"></p>
    <p id="resultSatisfaction"></p>
    <p id="resultFavorite"></p>
    <p id="resultComment"></p>
</div>

<script>
let isSending = false; // 送信中フラグ

function submitSurvey() {

    // 送信中または送信済みなら即終了
    if (isSending) return;

    const grade         = document.querySelector('input[name="grade"]:checked');
    const satisfaction  = document.querySelector('input[name="satisfaction"]:checked');
    const favoriteClass = document.getElementById("favoriteClass").value.trim();
    const comment       = document.getElementById("comment").value.trim();

    // --- バリデーション ---
    let hasError = false;

    function showError(id, show) {
        document.getElementById(id).style.display = show ? "block" : "none";
        if (show) hasError = true;
    }

    showError("error-grade",        !grade);
    showError("error-satisfaction", !satisfaction);
    showError("error-favorite",     favoriteClass === "");
    showError("error-comment",      comment === "");

    if (hasError) return;

    // --- 送信フラグを立ててボタンを無効化 ---
    isSending = true;
    const btn = document.querySelector("button");
    btn.disabled = true;
    btn.textContent = "送信中...";

    // --- 送信 ---
    fetch("https://script.google.com/macros/s/AKfycbyl6WW2dRiYX0_W4uFfIyRlpbUbx6jiCk-8x_7V_jsuksH7Uux2KJpXEvGa1ZkvT1TF/exec", {
        method: "POST",
        body: JSON.stringify({
            grade: grade.value,
            satisfaction: satisfaction.value,
            favoriteClass: favoriteClass,
            comment: comment
        })
    })
    .then(() => {
        document.getElementById("resultGrade").innerText        = "学年：" + grade.value;
        document.getElementById("resultSatisfaction").innerText = "満足度：" + satisfaction.value;
        document.getElementById("resultFavorite").innerText     = "好きな授業：" + favoriteClass;
        document.getElementById("resultComment").innerText      = "コメント：" + comment;

        document.getElementById("survey").style.display   = "none";
        document.getElementById("complete").style.display = "block";
    })
    .catch(error => {
        // エラー時だけフラグを戻して再送信できるようにする
        isSending = false;
        btn.disabled = false;
        btn.textContent = "送信";
        alert("送信エラー");
        console.log(error);
    });
}
</script>
<script src="script.js"></script>
</body>
</html>
